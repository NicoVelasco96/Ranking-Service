server:
  port: ${PORT:8083}

spring:
  application:
    name: ranking-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ranking_db}
    username: ${SPRING_DATASOURCE_USERNAME:tbe_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tbe_pass}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL:false}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    path: /api/docs
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

jwt:
  secret: ${JWT_SECRET:supersecretkey_changeinproduction_minimum256bits!!}